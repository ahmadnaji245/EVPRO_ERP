{% extends "base.html" %}
{% block title %}Login - EVPRO TEXTILE ERP{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <form method="post" class="panel">
            <h1 class="page-title mb-2">Login Admin</h1>
            <p class="text-muted">Masuk untuk mengelola ERP Surat Order.</p>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" name="username" autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-rdr w-100">Login</button>
        </form>
    </div>
</div>
{% endblock %}
