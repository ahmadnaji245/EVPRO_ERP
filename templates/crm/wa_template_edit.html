{% extends "base.html" %}
{% block title %}Edit Template WA - EVPRO ERP{% endblock %}
{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
    <div>
        <h1 class="page-title">Edit Template WA</h1>
        <p class="text-muted mb-0">{{ template.name }}</p>
    </div>
    <a class="btn btn-outline-dark" href="{{ url_for('crm.wa_templates') }}">Kembali</a>
</div>

<section class="panel">
    <form method="post" class="row g-3">
        <div class="col-md-6"><label class="form-label">Nama template</label><input class="form-control" name="name" value="{{ template.name }}" required></div>
        <div class="col-md-6"><label class="form-label">Kategori template</label><input class="form-control" name="category" value="{{ template.category }}" required></div>
        <div class="col-12"><label class="form-label">Isi pesan</label><textarea class="form-control" name="content" rows="10" required>{{ template.content }}</textarea></div>
        <div class="col-12"><label class="form-check"><input class="form-check-input" type="checkbox" name="is_active" value="1" {% if template.is_active %}checked{% endif %}> <span class="form-check-label">Aktif</span></label></div>
        <div class="col-12"><button class="btn btn-rdr">Simpan Template</button></div>
    </form>
</section>
{% endblock %}
