<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tracking Pesanan - EVPRO TEXTILE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/evpro.png.png') }}">
</head>
<body class="public-tracking-body">
    <main class="public-tracking-shell">
        <form class="public-tracking-card" method="post" action="{{ url_for('tracking.lookup') }}">
            <img class="public-tracking-logo" src="{{ url_for('static', filename='images/evpro.png.png') }}" alt="Logo EVPRO">
            <h1>Tracking Pesanan</h1>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} w-100" role="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <label class="form-label w-100" for="tracking_code">Masukkan Kode Tracking</label>
            <input
                class="form-control form-control-lg text-center text-uppercase"
                id="tracking_code"
                name="tracking_code"
                value="{{ tracking_code or '' }}"
                placeholder="EVP-A7Q9P2"
                autocomplete="off"
                required>
            <button class="btn btn-rdr btn-lg w-100" type="submit">CEK STATUS</button>
        </form>
    </main>
</body>
</html>
